name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        run: |
          pwd
          ls -la

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Verify AWS Connection
        run: |
          aws sts get-caller-identity

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name my-eks-cluster --region ap-south-1

      - name: Verify EKS Access
        run: |
          kubectl get nodes

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 654081960876.dkr.ecr.ap-south-1.amazonaws.com

      - name: Verify ECR Access
        run: |
          aws ecr describe-repositories --region ap-south-1
          
