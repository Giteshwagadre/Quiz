apiVersion: apps/v1
kind: Deployment

metadata:
  name: quize-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: quize

  template:
    metadata:
      labels:
        app: quize

    spec:
      containers:
      - name: quize-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 80
