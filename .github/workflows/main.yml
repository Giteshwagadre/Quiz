name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: quize
      CLUSTER_NAME: my-eks-cluster
      ACCOUNT_ID: 654081960876

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        run: |
          pwd
          ls -la

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Connection
        run: |
          aws sts get-caller-identity

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Verify EKS Access
        run: |
          kubectl get nodes

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Verify ECR Access
        run: |
          aws ecr describe-repositories --region ap-south-1
          
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.run_number }} .
          docker tag $ECR_REPOSITORY:${{ github.run_number }} \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}


      - name: Push to ECR
        run: |
            docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

      - name: Install Helm
        uses: azure/setup-helm@v4
                  
      - name: Deploy using Helm
        run: |
          helm upgrade --install quize ./helm/quize \
            --set image.repository=654081960876.dkr.ecr.ap-south-1.amazonaws.com/quize \
            --set image.tag=${{ github.run_number }}

      - name: Verify Rollout
        run: |
            kubectl rollout status deployment/quize-deployment

      - name: Verify Deployment
        run: |
          kubectl get deployment
          kubectl get pods -o wide
          kubectl get svc
          kubectl get nodes -o wide

          
